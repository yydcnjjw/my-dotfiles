<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- 1. 无衬线字体 (Sans-serif) - 用于 UI、网页正文 -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Noto Sans CJK SC</family> <!-- 作为备选 -->
        </prefer>
    </alias>

    <!-- 2. 衬线字体 (Serif) - 用于打印、正式文档 -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>Noto Serif CJK SC</family> <!-- 作为备选 -->
        </prefer>
    </alias>

    <!-- 3. 等宽字体 (Monospace) - 用于终端、代码编辑器 -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Hack Nerd Font Mono</family>
            <family>LXGW WenKai Mono</family>
            <family>Noto Sans Mono CJK SC</family> <!-- 作为备选 -->
        </prefer>
    </alias>
</fontconfig>
