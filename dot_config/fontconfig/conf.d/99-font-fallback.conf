<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
    <!-- 1. 无衬线字体 (Sans-serif) - 用于 UI、网页正文 -->
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>LXGW WenKai</family>
            <family>Noto Sans CJK SC</family> <!-- 作为备选 -->
        </prefer>
    </alias>

    <!-- 2. 衬线字体 (Serif) - 用于打印、正式文档 -->
    <alias>
        <family>serif</family>
        <prefer>
            <family>LXGW WenKai</family>
            <family>Noto Serif CJK SC</family> <!-- 作为备选 -->
        </prefer>
    </alias>

    <!-- 3. 等宽字体 (Monospace) - 用于终端、代码编辑器 -->
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Hack</family>
            <family>LXGW WenKai Mono</family>
            <family>Noto Sans Mono CJK SC</family> <!-- 作为备选 -->
        </prefer>
    </alias>

    <!-- 针对中文环境的通用回退优化 -->
    <match target="pattern">
        <test name="lang">
            <string>zh-cn</string>
        </test>
        <test name="family">
            <string>sans-serif</string>
        </test>
        <edit name="family" mode="prepend" binding="strong">
            <string>LXGW WenKai</string>
        </edit>
    </match>
</fontconfig>
